name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "."
          target: "/opt/tg_booking"
          strip_components: 0

      - name: Install Docker and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -e

            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            else
              SUDO="sudo"
            fi

            install_docker() {
              if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
                echo "Docker и Docker Compose уже установлены"
                docker --version
                docker compose version
                return
              fi

              echo "Установка Docker и Docker Compose..."
              $SUDO apt-get update -y
              $SUDO apt-get install -y ca-certificates curl gnupg lsb-release

              if ! command -v docker >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | $SUDO sh
              fi

              if ! docker compose version >/dev/null 2>&1; then
                $SUDO apt-get install -y docker-compose-plugin || true
              fi

              $SUDO systemctl enable docker
              $SUDO systemctl start docker

              if [ -n "$SUDO" ]; then
                $SUDO usermod -aG docker "$USER" || true
              fi

              docker --version
              docker compose version
            }

            install_docker

            APP_DIR=/opt/tg_booking
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > .env <<EOF
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}
            POSTGRES_DB=tg_booking
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EOF

            $SUDO docker compose build --no-cache bot
            $SUDO docker compose up -d

            $SUDO docker compose ps
